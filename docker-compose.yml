version: '3.8'

services:
  # Frontend - React + Nginx
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zapfit-web
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production
      - VITE_STRAVA_CLIENT_ID=${VITE_STRAVA_CLIENT_ID:-}
      - VITE_STRAVA_CLIENT_SECRET=${VITE_STRAVA_CLIENT_SECRET:-}
    volumes:
      - ./dist:/usr/share/nginx/html:ro
    networks:
      - zapfit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  zapfit-network:
    driver: bridge
